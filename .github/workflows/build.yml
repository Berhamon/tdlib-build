name: Build TDLib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Install deps
      run: sudo apt-get update && sudo apt-get install -y cmake g++ php-cli gperf

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        sdkmanager "ndk;25.2.9519653" "cmake;3.22.1" "platforms;android-34"
        echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Build
      run: |
        git clone --depth 1 https://github.com/tdlib/td.git
        cd td/example/android
        chmod +x build-tdlib.sh
        ./build-tdlib.sh

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: tdlib-aar
        path: td/example/android/tdlib/tdlib-release.aar
