name: Build TDLib AAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            gcc \
            make \
            php-cli \
            gperf \
            openjdk-17-jdk-headless \
            unzip \
            wget \
            curl \
            zip

      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          cd /tmp
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdtools.zip
          unzip -q cmdtools.zip
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm cmdtools.zip
          
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          
          echo "Installing NDK and tools..."
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1" "platforms;android-34" "build-tools;34.0.0"
          
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Clone TDLib
        run: |
          cd $HOME
          git clone --depth 1 https://github.com/tdlib/td.git
          echo "TDLib cloned successfully"

      - name: Create SDK symlink
        run: |
          cd $HOME/td/example/android
          ln -sf $ANDROID_SDK_ROOT SDK
          ls -la SDK/

      - name: Build OpenSSL
        run: |
          cd $HOME/td/example/android
          
          echo "=== Building OpenSSL ==="
          chmod +x ./build-openssl.sh
          ./build-openssl.sh
          
          echo "=== OpenSSL build complete ==="
          ls -la third-party/

      - name: Build TDLib
        run: |
          cd $HOME/td/example/android
          
          echo "=== Building TDLib ==="
          echo "SDK: $ANDROID_SDK_ROOT"
          echo "NDK: $ANDROID_NDK_ROOT"
          
          chmod +x ./build-tdlib.sh
          ./build-tdlib.sh
          
          echo "=== TDLib build complete ==="

      - name: List build output
        run: |
          echo "=== Searching for AAR files ==="
          find $HOME/td -name "*.aar" -type f 2>/dev/null || echo "No AAR found with find"
          
          echo "=== Checking tdlib directory ==="
          ls -la $HOME/td/example/android/tdlib/ || echo "tdlib directory not found"

      - name: Upload TDLib AAR
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-aar
          path: |
            ~/td/example/android/tdlib/*.aar
            ~/td/example/android/tdlib/tdlib-*.aar
          if-no-files-found: warn

      - name: Upload all build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-full-build
          path: ~/td/example/android/tdlib/
          if-no-files-found: warn
