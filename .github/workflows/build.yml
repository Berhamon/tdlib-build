name: Build TDLib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ php-cli gperf

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd /tmp
        wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmd.zip
        unzip -q cmd.zip
        mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
        
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "ndk;25.2.9519653" "cmake;3.22.1" "platforms;android-34" "build-tools;34.0.0"
        
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

    - name: Build TDLib
      run: |
        echo "SDK: $ANDROID_SDK_ROOT"
        echo "NDK: $ANDROID_NDK_ROOT"
        ls -la $ANDROID_SDK_ROOT/
        ls -la $ANDROID_NDK_ROOT/ || echo "NDK dir check"
        
        git clone --depth 1 https://github.com/tdlib/td.git
        cd td/example/android
        chmod +x build-tdlib.sh
        ./build-tdlib.sh

    - name: Upload AAR
      uses: actions/upload-artifact@v4
      with:
        name: tdlib-aar
        path: td/example/android/tdlib/tdlib-release.aar
