name: Build TDLib AAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            gcc \
            make \
            php-cli \
            gperf \
            openjdk-17-jdk-headless \
            unzip \
            wget \
            curl \
            zip

      - name: Setup Android SDK with correct NDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          cd /tmp
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdtools.zip
          unzip -q cmdtools.zip
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm cmdtools.zip
          
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          
          # Устанавливаем NDK версии 23.2.8568313 — именно эту ищет build-openssl.sh
          echo "Installing NDK 23.2.8568313..."
          sdkmanager "ndk;23.2.8568313" "cmake;3.22.1" "platforms;android-34" "build-tools;34.0.0"
          
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/23.2.8568313" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-sdk/ndk/23.2.8568313" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Clone TDLib
        run: |
          cd $HOME
          git clone --depth 1 https://github.com/tdlib/td.git

      - name: Create SDK symlink
        run: |
          cd $HOME/td/example/android
          ln -sf $ANDROID_SDK_ROOT SDK
          echo "=== SDK contents ==="
          ls -la SDK/
          echo "=== NDK contents ==="
          ls -la SDK/ndk/

      - name: Build OpenSSL
        run: |
          cd $HOME/td/example/android
          
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.2.8568313
          
          echo "=== Building OpenSSL ==="
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          
          chmod +x ./build-openssl.sh
          ./build-openssl.sh
          
          echo "=== OpenSSL build complete ==="
          ls -la third-party/openssl/ || echo "checking openssl dir"

      - name: Build TDLib
        run: |
          cd $HOME/td/example/android
          
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.2.8568313
          
          echo "=== Building TDLib ==="
          chmod +x ./build-tdlib.sh
          ./build-tdlib.sh
          
          echo "=== Build complete ==="
          find . -name "*.aar" -type f

      - name: Upload TDLib AAR
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-aar
          path: ~/td/example/android/tdlib/
          if-no-files-found: warn
